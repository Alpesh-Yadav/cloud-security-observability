apiVersion: apps/v1
kind: Deployment
metadata:
  name: security-exporter
  labels:
    app: security-exporter
spec:
  replicas: {{ .Values.replicas }}
  selector:
    matchLabels:
      app: security-exporter
  template:
    metadata:
      labels:
        app: security-exporter
    spec:
      containers:
        - name: security-exporter
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          ports:
            - containerPort: {{ .Values.port }}
          env:
            - name: AWS_ENDPOINT
              value: "{{ .Values.aws.endpoint }}"
          resources:
            limits:
              cpu: {{ .Values.resources.limits.cpu }}
              memory: {{ .Values.resources.limits.memory }}
          livenessProbe:
            httpGet:
              path: /metrics
              port: {{ .Values.port }}
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /metrics
              port: {{ .Values.port }}
            initialDelaySeconds: 10
            periodSeconds: 15
