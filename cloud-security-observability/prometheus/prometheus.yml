global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alerts.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets: ['monitoring-kube-prometheus-alertmanager.monitoring.svc.cluster.local:9093']

scrape_configs:
  - job_name: 'security_exporter'
    static_configs:
      - targets: ['security-exporter.security.svc.cluster.local:8000']

  - job_name: 'prometheus'
    static_configs:
      - targets: ['prometheus:9090']

  - job_name: 'alertmanager'
    static_configs:
      - targets: ['monitoring-kube-prometheus-alertmanager.monitoring.svc.cluster.local:9093']